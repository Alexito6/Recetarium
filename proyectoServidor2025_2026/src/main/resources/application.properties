# ------------------------
# DATOS DE CONEXIËN A MYSQL
# ------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/db_recetarium?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------
# HIBERNATE / JPA
# ------------------------
# validate: comprueba que las tablas existen
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola (para depuraciˇn)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ------------------------
# HIKARI CONNECTION POOL (opcional, Spring Boot lo configura por defecto)
# ------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariCP

# ------------------------
# PUERTO DEL SERVIDOR (opcional)
# ------------------------
server.port=8080
